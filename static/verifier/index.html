<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify credential — NHS E-Learning Credential Passport</title>
  <style>
    /* NHS design system: https://service-manual.nhs.uk/design-system/styles/colour */
    :root {
      --nhsuk-text: #212b32;
      --nhsuk-link: #005eb8;
      --nhsuk-link-hover: #003d82;
      --nhsuk-focus: #ffeb3b;
      --nhsuk-success: #007f3b;
      --nhsuk-error: #d5281b;
      --nhsuk-button: #007f3b;
      --nhsuk-button-hover: #00662f;
      --nhsuk-border: #aeb7bd;
      --nhsuk-body-bg: #f0f4f5;
      --nhsuk-panel-bg: #fff;
      --nhsuk-secondary-text: #4c6272;
      --expired-warn: #ffb81c;
      --unverified: #6b7280;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Frutiger, 'Frutiger Linotype', Arial, sans-serif;
      background: var(--nhsuk-body-bg);
      color: var(--nhsuk-text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .nhsuk-header {
      background: #003d82;
      color: #fff;
      padding: 1.25rem 0;
      margin: 0;
    }
    .nhsuk-header__container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1.25rem;
    }
    .nhsuk-header__logo { display: block; margin: 0; filter: brightness(0) invert(1) drop-shadow(0 1px 2px rgba(0,0,0,0.25)); height: 56px; width: auto; order: 1; }
    .nhsuk-header__title { font-size: 1.75rem; font-weight: 700; margin: 0; text-shadow: 0 1px 3px rgba(0,0,0,0.35); letter-spacing: 0.02em; order: 2; }
    .nhsuk-header__title a { color: #fff; text-decoration: none; text-shadow: 0 1px 3px rgba(0,0,0,0.35); }
    .nhsuk-header__title a:hover { text-decoration: underline; }
    .nhsuk-main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .nhsuk-page-heading { font-size: 2rem; font-weight: 700; margin: 0 0 0.5rem 0; color: var(--nhsuk-text); }
    .nhsuk-body-s { font-size: 1rem; color: var(--nhsuk-secondary-text); margin-bottom: 1.5rem; }
    .nhsuk-form-group { margin-bottom: 1.25rem; }
    .nhsuk-label { display: block; font-weight: 600; margin-bottom: 0.35rem; font-size: 1.125rem; }
    .nhsuk-input, .nhsuk-textarea {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid var(--nhsuk-border);
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
    }
    .nhsuk-textarea { min-height: 120px; resize: vertical; }
    .nhsuk-input:focus, .nhsuk-textarea:focus {
      outline: 3px solid var(--nhsuk-focus);
      outline-offset: 0;
      border-color: var(--nhsuk-text);
    }
    .nhsuk-hint { font-size: 0.875rem; color: var(--nhsuk-secondary-text); margin-top: 0.25rem; }
    .nhsuk-button {
      background: var(--nhsuk-button);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .nhsuk-button:hover { background: var(--nhsuk-button-hover); }
    .nhsuk-button:focus {
      outline: 3px solid var(--nhsuk-focus);
      outline-offset: 2px;
    }
    .nhsuk-button:disabled { background: var(--nhsuk-border); cursor: not-allowed; }
    .nhsuk-panel { background: var(--nhsuk-panel-bg); padding: 1.5rem; margin-top: 1.5rem; border-left: 4px solid; }
    .nhsuk-panel--valid   { border-color: var(--nhsuk-success); }
    .nhsuk-panel--expired { border-color: var(--expired-warn); background: #fff9e6; }
    .nhsuk-panel--revoked { border-color: var(--nhsuk-error); background: #fdecea; }
    .nhsuk-panel--unverified { border-color: var(--unverified); background: #f3f4f6; }
    .nhsuk-panel__title { margin: 0 0 0.5rem 0; font-size: 1.25rem; font-weight: 700; }
    .nhsuk-panel--valid .nhsuk-panel__title   { color: var(--nhsuk-success); }
    .nhsuk-panel--expired .nhsuk-panel__title { color: #996a00; }
    .nhsuk-panel--revoked .nhsuk-panel__title { color: var(--nhsuk-error); }
    .nhsuk-panel--unverified .nhsuk-panel__title { color: var(--unverified); }
    .nhsuk-panel pre { background: var(--nhsuk-body-bg); padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.875rem; }
  </style>
</head>
<body>
  <header class="nhsuk-header" role="banner">
    <div class="nhsuk-header__container">
      <h1 class="nhsuk-header__title"><a href="/">NHS E-Learning Credential Passport</a></h1>
      <a href="/"><img src="https://www.sheffieldpartnership.nhs.uk/themes/custom/omega_bigbluedoor/logo.svg" alt="NHS Sheffield Partnership" class="nhsuk-header__logo" width="120" height="51"></a>
    </div>
  </header>

  <main class="nhsuk-main" id="maincontent" role="main">
    <h2 class="nhsuk-page-heading">Verify a credential</h2>
    <p class="nhsuk-body-s">Check that a staff member’s e-learning credential is valid. Paste the credential ID or the full verification link they shared with you.</p>

    <form id="verifyForm">
      <div class="nhsuk-form-group">
        <label class="nhsuk-label" for="input">Credential ID or verification URL</label>
        <textarea class="nhsuk-textarea" id="input" name="input" placeholder="Paste credential ID (e.g. nhs-el-abc123...) or the full verification URL from a shared link" aria-describedby="input-hint"></textarea>
        <span class="nhsuk-hint" id="input-hint">If the staff member shared a link, paste the entire URL here.</span>
      </div>
      <button type="submit" class="nhsuk-button" id="btn">Verify</button>
    </form>

    <div id="result"></div>
  </main>

  <script>
    const form = document.getElementById('verifyForm');
    const input = document.getElementById('input');
    const resultEl = document.getElementById('result');
    const btn = document.getElementById('btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const raw = (input.value || '').trim();
      if (!raw) return;

      btn.disabled = true;
      resultEl.innerHTML = '<p>Checking…</p>';

      let credentialId = null;
      let jwtParam = null;

      try {
        if (raw.startsWith('http')) {
          const url = new URL(raw);
          credentialId = url.pathname.split('/').filter(Boolean).pop();
          if (credentialId === 'verify') credentialId = url.pathname.split('/').filter(Boolean).slice(-1)[0];
          jwtParam = url.searchParams.get('jwt') || null;
        } else {
          credentialId = raw.split(/[\s\n]/)[0].trim();
        }
      } catch (_) {
        credentialId = raw.split(/[\s\n]/)[0].trim();
      }

      const apiUrl = `/api/credentials/verify/${encodeURIComponent(credentialId)}${jwtParam ? '?jwt=' + encodeURIComponent(jwtParam) : ''}`;

      try {
        const res = await fetch(apiUrl);
        const data = await res.json();
        const status = (data.status || 'UNVERIFIED').toLowerCase();
        resultEl.className = 'nhsuk-panel nhsuk-panel--' + status;
        resultEl.innerHTML = `
          <h3 class="nhsuk-panel__title">${data.status}</h3>
          <p>${escapeHtml(data.message || '')}</p>
          ${data.claims ? '<pre>' + escapeHtml(JSON.stringify(data.claims, null, 2)) + '</pre>' : ''}
        `;
      } catch (err) {
        resultEl.className = 'nhsuk-panel nhsuk-panel--unverified';
        resultEl.innerHTML = '<h3 class="nhsuk-panel__title">Error</h3><p>' + escapeHtml(err.message) + '</p>';
      }
      btn.disabled = false;
    });

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
